    <style>
        :root {
            --bg-base:      #0e0f13;
            --bg-card:      #16181f;
            --bg-hover:     #1c1f29;
            --bg-embed:     #1a1d27;
            --accent:       #5b8af5;
            --accent-dim:   #2e3f73;
            --accent-glow:  rgba(91,138,245,0.08);
            --text-primary: #e8eaf0;
            --text-muted:   #7a7f96;
            --text-dim:     #4a4f68;
            --border:       rgba(255,255,255,0.06);
            --border-strong:rgba(255,255,255,0.12);
            --font-main:    'Sora', system-ui, sans-serif;
            --font-mono:    'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-main); background: var(--bg-base); color: var(--text-primary); min-height: 100vh; }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #13162b 0%, #0e0f13 60%);
            border-bottom: 1px solid var(--border-strong);
            padding: 32px 24px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
        .header-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: var(--accent-dim); display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .header-icon svg { width: 22px; height: 22px; fill: var(--accent); }
        .header-text { flex: 1; min-width: 0; }
        .header-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
        .header-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-family: var(--font-mono); }
        .header-badge {
            font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px;
            background: var(--accent-dim); color: var(--accent);
            border: 1px solid rgba(91,138,245,0.25); white-space: nowrap; flex-shrink: 0;
        }

        /* META BAR */
        .meta-bar { max-width: 860px; margin: 0 auto; padding: 0 24px; }
        .meta-bar-inner {
            display: flex; border-radius: 0 0 12px 12px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-top: none; overflow: hidden;
        }
        .meta-item { flex: 1; padding: 14px 18px; border-right: 1px solid var(--border); }
        .meta-item:last-child { border-right: none; }
        .meta-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 5px; }
        .meta-value { font-size: 13px; font-weight: 500; }

        /* MESSAGES */
        .messages-wrap { max-width: 860px; margin: 0 auto; padding: 28px 24px 60px; }
        .message-group { display: flex; gap: 14px; margin-bottom: 4px; }
        .message-group.spaced { margin-top: 20px; }
        .avatar-col { width: 40px; flex-shrink: 0; padding-top: 2px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; display: block; background: var(--accent-dim); }
        .avatar-spacer { width: 40px; height: 40px; }
        .message-col { flex: 1; min-width: 0; }
        .message-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
        .author-name { font-size: 14px; font-weight: 600; }
        .author-bot {
            font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
            background: #5b8af5; color: #fff; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .timestamp { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
        .message-bubble {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 4px 12px 12px 12px; padding: 10px 14px;
            margin-bottom: 2px; transition: background 0.15s;
        }
        .message-bubble:hover { background: var(--bg-hover); }
        .message-content { font-size: 14px; line-height: 1.65; word-break: break-word; white-space: pre-wrap; }
        .message-content:empty { display: none; }

        /* ATTACHMENTS */
        .attachments { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
        .attachment-link {
            display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
            color: var(--accent); text-decoration: none; background: var(--accent-glow);
            border: 1px solid rgba(91,138,245,0.2); padding: 4px 10px; border-radius: 6px;
            transition: background 0.15s, border-color 0.15s;
        }
        .attachment-link:hover { background: rgba(91,138,245,0.15); border-color: rgba(91,138,245,0.4); }
        .attachment-link svg { width: 12px; height: 12px; fill: currentColor; flex-shrink: 0; }
        .attachment-image {
            display: block; max-width: 360px; max-height: 280px;
            border-radius: 8px; border: 1px solid var(--border); margin-top: 8px; object-fit: cover;
        }

        /* EMBEDS */
        .embed {
            margin-top: 8px; border-left: 4px solid var(--accent);
            background: var(--bg-embed); border-radius: 0 8px 8px 0;
            padding: 12px 14px; border: 1px solid var(--border); border-left: 4px solid var(--accent);
        }
        .embed-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .embed-description { font-size: 13px; color: var(--text-muted); line-height: 1.6; white-space: pre-wrap; }
        .embed-fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 10px; }
        .embed-field-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--accent); margin-bottom: 3px; }
        .embed-field-value { font-size: 13px; }
        .embed-image { display: block; max-width: 100%; border-radius: 6px; margin-top: 10px; }

        /* DATE DIVIDER */
        .date-divider { display: flex; align-items: center; gap: 12px; margin: 24px 0 20px; }
        .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .date-divider-label { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); white-space: nowrap; }

        /* FOOTER */
        .footer { text-align: center; padding: 20px 24px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }

        @media (max-width: 600px) {
            .meta-bar-inner { flex-direction: column; }
            .meta-item { border-right: none; border-bottom: 1px solid var(--border); }
            .meta-item:last-child { border-bottom: none; }
        }
    </style>
</head>

function avatarURL(a){if(a.avatar)return`https://cdn.discordapp.com/avatars/${a.id}/${a.avatar}.png?size=80`;return`https://cdn.discordapp.com/embed/avatars/${parseInt(a.discriminator||'0')%5}.png`}
function fmtDate(iso){return new Date(iso).toLocaleDateString('sv-SE',{year:'numeric',month:'long',day:'numeric'})}
function fmtTime(iso){return new Date(iso).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'})}
function fmtDT(iso){return new Date(iso).toLocaleString('sv-SE',{dateStyle:'medium',timeStyle:'short'})}
function isImg(u){return/\.(png|jpe?g|gif|webp|svg)(\?|$)/i.test(u)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function renderEmbeds(embeds){if(!embeds||!embeds.length)return'';return embeds.map(e=>{const f=e.fields&&e.fields.length?`<div class="embed-fields">${e.fields.map(f=>`<div class="embed-field"><div class="embed-field-name">${esc(f.name)}</div><div class="embed-field-value">${esc(f.value)}</div></div>`).join('')}</div>`:'';const img=e.image&&e.image.url?`<img class="embed-image" src="${esc(e.image.url)}" loading="lazy">`:'';return`<div class="embed">${e.title?`<div class="embed-title">${esc(e.title)}</div>`:''}${e.description?`<div class="embed-description">${esc(e.description)}</div>`:''}${f}${img}</div>`}).join('')}

function renderMsgs(msgs){if(!msgs||!msgs.length)return'<p style="color:var(--text-muted);text-align:center;padding:40px 0">Inga meddelanden.</p>';const rev=[...msgs].reverse();let html='',prevId=null,prevDate=null;rev.forEach((m,i)=>{const first=m.author.id!==prevId;const dl=fmtDate(m.createdAt);if(dl!==prevDate){html+=`<div class="date-divider"><span class="date-divider-label">${dl}</span></div>`;prevDate=dl}const gc=(i===0||first)?'message-group spaced':'message-group';const av=first?`<img class="avatar" src="${avatarURL(m.author)}" alt="${esc(m.author.tag)}" loading="lazy" onerror="this.style.background='#2e3f73';this.src=''">`:'<div class="avatar-spacer"></div>';const hdr=first?`<div class="message-header"><span class="author-name">${esc(m.author.tag.split('#')[0])}</span>${m.author.bot?'<span class="author-bot">BOT</span>':''}<span class="timestamp">${fmtTime(m.createdAt)}</span></div>`:'';html+=`<div class="${gc}"><div class="avatar-col">${av}</div><div class="message-col">${hdr}<div class="message-bubble"><div class="message-content">${esc(m.content)}</div>${renderEmbeds(m.embeds)}${renderAtts(m.attachments)}</div></div></div>`;prevId=m.author.id});return html}
